# resolvers-registry.toml — populated in S-12.07
# Schema: each [[resolvers]] entry declares one WASM-backed context resolver.
# Absent file = zero resolvers (BC-1.13.001 INV2 — not an error).
schema_version = 1

# WaveContextResolver: injects wave_context into plugin_config for hooks that
# declare `needs_context = ["wave-context"]`. Reads .factory/wave-state.yaml
# and .factory/STATE.md (both within path_allow). (BC-4.12.003 INV1, AC-005, AC-009)
[[resolvers]]
name = "wave-context"
plugin = "hook-plugins/vsdd-context-resolvers.wasm"
path_allow = [".factory/"]
