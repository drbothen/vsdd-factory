# resolvers-registry.toml — populated in S-12.07
# Schema: each [[resolvers]] entry declares one WASM-backed context resolver.
# Absent file = zero resolvers (BC-1.13.001 INV2 — not an error).
schema_version = 1

# WaveContextResolver: injects wave_context into plugin_config for hooks that
# declare `needs_context = ["wave_context"]`. Reads .factory/wave-state.yaml
# and .factory/STATE.md (both within path_allow). (BC-4.12.003 INV1, AC-005, AC-009)
#
# Canonical key "wave_context" (underscore) per BC-4.12.005 PC7.
# Both 'name' and 'context_key' use the same form to keep needs_context entries
# (in hooks-registry.toml) and the merged plugin_config key aligned.
[[resolvers]]
name = "wave_context"
plugin = "hook-plugins/vsdd-context-resolvers.wasm"
context_key = "wave_context"
# F-P3-007 fix: narrowed from [".factory/"] to exact files the resolver reads.
# The WaveContextResolver only reads wave-state.yaml + STATE.md (BC-4.12.003 INV1).
# path_allowed() uses starts_with(), so exact filenames are the narrowest valid grant.
path_allow = [".factory/wave-state.yaml", ".factory/STATE.md"]
