[[hooks]]
# BC-4.10.001: blocks wave-gate dispatch when any story lacks convergence clearance.
# BC-4.10.002: gracefully degrades (Continue) when not in wave-gate dispatch context.
# Scoped to wave-gate dispatch via payload.agent_type == "wave-gate-dispatch" check
# (enforced inside the hook itself — BC-4.10.001 invariant 1).
# HOST_ABI_VERSION = 1; no new host functions (AC-011).
name = "validate-per-story-adversary-convergence"
event = "SubagentStop"
plugin = "hook-plugins/validate-per-story-adversary-convergence.wasm"
priority = 960
timeout_ms = 10000
# Canonical-form WASM hook (HOST_ABI block_with_fix). Block signal:
# HookResult::Block via dispatcher exit code 2 (BC-4.10.001 PC8). D-349
# retired advisory-block-mode for new hooks; canonical form applies here.
# on_error = "continue" means a hook CRASH does NOT block — graceful-degrade
# on hook failure per BC-4.10.002 PC3. This is orthogonal to the block signal.
on_error = "continue"
# S-12.08 AC-005: WaveContextResolver injects wave_context before dispatch
# (BC-1.13.001 postcondition 4). The hook reads plugin_config["wave_context"]["stories"].
needs_context = ["wave_context"]

[hooks.capabilities.read_file]
path_allow = [".factory/cycles"]

# ---------- validate-stable-anchors (PreToolUse, Write|Edit) ----------
# TD-VSDD-091 stable-anchor convention enforcement for .factory/specs/**/*.md.
# Initial driver: TD-031 (P1 escalated O-P16-001).
# Blocks spec body text containing `*.<ext>:NNN` volatile line citations where
# ext is in the source-code/config/test allowlist: rs, toml, sh, bash, py, ts,
# tsx, js, jsx, go, bats, yaml, yml, json, lock, lobster, wasm, c, cpp, h, hpp, rb.
# Markdown cross-document references (.md:NNN) are a DISTINCT concern handled by
# heading-anchor conventions — they are NOT in scope for this hook.
# Exempt zones: Amendment/Changelog sections; VP-079 Scenario 6 SITES arrays.
# F-P16-001 / F-P16-002 / F-P17-001: recurrence-breaking mechanical enforcement.
# NOT via legacy-bash-adapter (Decision 5 WASM-migration rule).

[[hooks]]
name = "validate-stable-anchors"
event = "PreToolUse"
tool = "Edit|Write"
plugin = "hook-plugins/validate-stable-anchors.wasm"
priority = 155
timeout_ms = 5000
on_error = "block"

[hooks.capabilities.read_file]
path_allow = [".factory/specs"]

