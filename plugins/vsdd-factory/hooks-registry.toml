# hooks-registry.toml — Human-edited source of truth as of v1.0.0.
# The v0.79.x→v1.0 migration generator has been retired; edit this file
# directly to add or modify hook registrations.
#
# Every entry routes through hook-plugins/legacy-bash-adapter.wasm,
# which reads `[hooks.config] script_path` and execs the underlying
# bash script. Native-WASM ports (S-2.5 onward) replace individual
# entries one-by-one; legacy entries can coexist with native ones in
# this same file.

schema_version = 1

# ---------- PostToolUse ----------

[[hooks]]
name = "capture-commit-activity"
event = "PostToolUse"
plugin = "hook-plugins/legacy-bash-adapter.wasm"
priority = 110
timeout_ms = 5000
on_error = "continue"

[hooks.config]
script_path = "hooks/capture-commit-activity.sh"

[hooks.capabilities]
env_allow = ["PATH", "HOME", "TMPDIR", "CLAUDE_PROJECT_DIR", "CLAUDE_PLUGIN_ROOT", "VSDD_SESSION_ID"]

[hooks.capabilities.exec_subprocess]
binary_allow = ["bash", "git", "gh", "jq"]
shell_bypass_acknowledged = "legacy-bash-adapter runs unported hooks"
env_allow = ["PATH", "HOME", "TMPDIR", "CLAUDE_PROJECT_DIR", "CLAUDE_PLUGIN_ROOT", "VSDD_SESSION_ID"]

