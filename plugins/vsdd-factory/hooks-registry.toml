# hooks-registry.toml — Human-edited source of truth as of v1.0.0.
# The v0.79.x→v1.0 migration generator has been retired; edit this file
# directly to add or modify hook registrations.
#
# Most entries route through hook-plugins/legacy-bash-adapter.wasm,
# which reads `[hooks.config] script_path` and execs the underlying
# bash script. Native-WASM ports (S-2.5 onward) replace individual
# entries one-by-one; 21 native-WASM ports (S-2.5+) coexist with
# 35 legacy-bash-adapter entries in this same file.

schema_version = 2

# ---------- SessionStart ----------

[[hooks]]
name = "session-start-telemetry"
event = "SessionStart"
plugin = "hook-plugins/session-start-telemetry.wasm"
timeout_ms = 8000
async = true

[hooks.capabilities.read_file]
path_allow = [".claude/settings.local.json"]

[hooks.capabilities.exec_subprocess]
binary_allow = ["factory-health"]

# ---------- SessionEnd ----------

[[hooks]]
name = "session-end-telemetry"
event = "SessionEnd"
plugin = "hook-plugins/session-end-telemetry.wasm"
timeout_ms = 5000
async = true

# ---------- WorktreeCreate ----------

[[hooks]]
name = "worktree-hooks"
event = "WorktreeCreate"
plugin = "hook-plugins/worktree-hooks.wasm"
timeout_ms = 5000
async = true

# ---------- WorktreeRemove ----------

[[hooks]]
name = "worktree-hooks"
event = "WorktreeRemove"
plugin = "hook-plugins/worktree-hooks.wasm"
timeout_ms = 5000
async = true

# ---------- PostToolUseFailure ----------

[[hooks]]
