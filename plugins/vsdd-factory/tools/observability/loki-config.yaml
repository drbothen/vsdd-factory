# Loki config for the vsdd-factory local stack.
#
# Why this file exists: Loki's defaults reject log entries whose timestamps
# are more than ~2h behind the current chunk's creation time (effectively,
# 2h of "old data" is accepted). When the otel-collector restarts and
# re-tails historical events from .factory/logs/events-*.jsonl, batches
# containing events older than ~2h are rejected with HTTP 400 "entry too
# far behind", which the otlphttp exporter treats as a permanent error
# and drops the whole batch. That's fine for live dev, but it means a
# stack restart loses visibility on the previous day's events.
#
# This config extends the acceptable age to 30 days and bumps
# max_chunk_age accordingly, so the collector can back-fill historical
# telemetry after any stack restart or image upgrade.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Accept events up to 30 days old. Lets the collector backfill when a
# stack restart replays historical log entries from events-*.jsonl.
#
# otlp_config: Loki's native OTLP ingester only promotes `service.name` to
# a stream label by default. Everything else lands as structured metadata.
# Our dashboards rely on stream-label filters like {event_type="pr.merged"},
# so the four factory-shape attributes (event_type, hook, reason, severity)
# must be index labels. Cardinality is bounded: ~4 event_types × ~44 hooks
# × ~70 reasons × ~4 severities = well under Loki's per-tenant stream cap.
#
# Previously (Loki 3.0 + collector-contrib 0.94), the collector's standalone
# `loki` exporter read a `loki.resource.labels` HINT attribute added by our
# attributes/loki-label-hint processor. That exporter was removed in
# collector-contrib ~0.112, so we now ship to Loki via otlphttp, and Loki
# itself has to be told which resource attributes to promote.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 720h  # 30d
  max_query_series: 5000
  allow_structured_metadata: true
  volume_enabled: true
  otlp_config:
    resource_attributes:
      ignore_defaults: false
      attributes_config:
        - action: index_label
          attributes:
            - service.name
            - event_type
            - hook
            - reason
            - severity

ingester:
  chunk_idle_period: 1h
  chunk_target_size: 1572864
  max_chunk_age: 720h  # 30d — must be >= reject_old_samples_max_age
  chunk_retain_period: 30s

ruler:
  alertmanager_url: http://localhost:9093

# Compactor — needed for chunk retention enforcement.
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: false
