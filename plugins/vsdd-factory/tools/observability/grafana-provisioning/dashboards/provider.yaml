# Dashboard provider — points Grafana at /var/lib/grafana/dashboards
# (where we mount JSON dashboard files in docker-compose.yml).

apiVersion: 1

providers:
  - name: vsdd-factory
    orgId: 1
    folder: "VSDD Factory"
    folderUid: vsdd-factory
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
