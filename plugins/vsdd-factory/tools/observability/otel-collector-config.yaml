# OpenTelemetry Collector configuration for the vsdd-factory local stack.
#
# Two input sources feed the same Loki instance with distinct service_name:
#
#   1. filelog receiver   — tails .factory/logs/events-*.jsonl (our hook events)
#                           → tagged service_name=vsdd-factory
#   2. otlp receiver      — accepts Claude Code's native OTel export
#                           → tagged service_name=claude-code
#
# Metrics and traces from the OTLP receiver are absorbed by the debug
# exporter (no persistent storage). Add a Prometheus exporter + Prometheus
# container to compose if metrics persistence becomes important.
#
# The file_storage extension persists filelog read offsets across restarts
# so hook events aren't re-ingested after a container restart.

extensions:
  file_storage:
    directory: /var/lib/otelcol

receivers:
  filelog:
    include:
      - /var/log/factory/events-*.jsonl
    # Start from the first line the first time. On subsequent starts, the
    # file_storage extension remembers the last offset.
    start_at: beginning
    storage: file_storage
    # Each line is a standalone JSON event.
    multiline:
      line_start_pattern: ^\{
    operators:
      # Parse the JSON body into structured attributes.
      - type: json_parser
        parse_from: body
        timestamp:
          parse_from: attributes.ts
          layout_type: strptime
          layout: '%Y-%m-%dT%H:%M:%S%z'
      # Promote useful fields from body attributes into log record attributes
      # so they're queryable in Loki as labels or structured metadata.
      - type: move
        from: attributes.type
        to: resource.event_type
      # hook/reason are only on hook.block / hook.action events — agent.start
      # and agent.stop don't have them. Guard with `if:` so the collector
      # doesn't spam warnings.
      - type: move
        from: attributes.hook
        to: resource.hook
        if: 'attributes.hook != nil'
      - type: move
        from: attributes.reason
        to: resource.reason
        if: 'attributes.reason != nil'
      - type: copy
        from: attributes.severity
        to: resource.severity
        if: 'attributes.severity != nil'

  # OTLP receiver for Claude Code's native telemetry. The http endpoint is
  # what Claude exports to when OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf.
  # Compose exposes 4318 on the host; Claude Code in the host process
  # targets http://localhost:4318. gRPC (4317) is also enabled for users
  # who prefer that protocol, but compose does not expose 4317 by default.
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    send_batch_size: 100
    timeout: 5s

  # Tag hook-event logs with service.name=vsdd-factory. The Loki exporter
  # promotes the OTel semantic-convention resource attribute `service.name`
  # (dotted, NOT `service_name` with an underscore) to the Loki label
  # `service_name`. Using the underscore form leaves the attribute as a
  # plain structured-metadata field while Loki's default "unknown_service"
  # wins the label, which silently breaks every dashboard query of the
  # form `{service_name="vsdd-factory"}`. Action must be `upsert` so this
  # overrides the SDK/collector default.
  #
  resource:
    attributes:
      - key: service.name
        value: vsdd-factory
        action: upsert

  # Same rules for Claude's pipeline — `service.name` dotted, `upsert`.
  # Claude's SDK already sets `service.name=claude-code` on its own
  # resource, but we upsert to guarantee the label in case the env
  # changes or an older Claude build omits it.
  resource/claude:
    attributes:
      - key: service.name
        value: claude-code
        action: upsert

  # Promote the listed resource attributes to Loki stream labels. The
  # `loki.resource.labels` HINT is a LOG RECORD attribute (not a resource
  # attribute) — placing it on the resource silently does nothing. The
  # Loki exporter reads this hint off each log record at export time and
  # pulls the named resource attributes up into the stream label set.
  # Dashboards query these as Loki labels: {event_type="hook.block"} etc.
  # Cardinality is bounded: ~4 event_types × ~40 hooks × ~70 reasons ×
  # ~4 severities — local-Loki comfortable.
  attributes/loki-label-hint:
    actions:
      - key: loki.resource.labels
        value: "event_type, hook, reason, severity"
        action: upsert

exporters:
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    # Loki labels — keep cardinality low. hook/reason go as structured
    # metadata via default_labels_enabled below rather than labels.
    default_labels_enabled:
      exporter: true
      job: true
      instance: true
      level: true

  # Debug is kept alongside prometheusremotewrite so collector stdout
  # still shows what's flowing, useful for troubleshooting.
  debug:
    verbosity: basic

  # Prometheus remote_write — persists Claude's metrics (token counts,
  # tool invocation counters, session durations, cost estimates if
  # emitted). Prometheus must be started with
  # --web.enable-remote-write-receiver for this endpoint to exist;
  # docker-compose.yml sets that flag on the prometheus service.
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    # Promote resource attributes to Prometheus labels on every metric.
    # Default behavior is false, which keeps resource attrs as target_info
    # metadata only — ugly to query. We want service.name, session.id,
    # etc. as actual labels.
    resource_to_telemetry_conversion:
      enabled: true
    # Local dev — no TLS, no auth, localhost-only. Do NOT enable this
    # exporter without tls/auth if you expose the stack beyond localhost.
    tls:
      insecure: true

service:
  extensions: [file_storage]
  pipelines:
    # Hook events from .factory/logs → Loki, tagged vsdd-factory.
    # attributes/loki-label-hint must run AFTER resource so service.name
    # is set, but BEFORE loki so the hint is in place at export time.
    logs:
      receivers: [filelog]
      processors: [batch, resource, attributes/loki-label-hint]
      exporters: [loki]

    # Claude Code's native OTel logs → Loki, tagged claude-code.
    # Includes api_request_body, api_response_body, tool_result, prompt
    # (when OTEL_LOG_USER_PROMPTS=1), and session events.
    logs/claude:
      receivers: [otlp]
      processors: [batch, resource/claude]
      exporters: [loki]

    # Metrics from Claude → Prometheus (persistent) + debug (stdout
    # visibility). The resource/claude processor ensures service.name is
    # claude-code on the metrics too. Add Tempo later if you want to
    # persist traces; for now they only show in collector stdout.
    metrics:
      receivers: [otlp]
      processors: [batch, resource/claude]
      exporters: [prometheusremotewrite, debug]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
  telemetry:
    logs:
      level: info
