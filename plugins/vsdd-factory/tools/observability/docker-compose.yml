# Local observability stack for vsdd-factory
#
# Services:
#   otel-collector  — tails .factory/logs/events-*.jsonl, ships to Loki;
#                     receives OTLP from Claude Code, ships metrics to
#                     Prometheus and logs to Loki
#   loki            — log storage
#   prometheus      — metrics storage (for cost/usage tracking)
#   grafana         — UI with preconfigured datasources + starter dashboards
#
# Start with: bin/factory-obs up
# Or directly: docker compose -f plugins/vsdd-factory/tools/observability/docker-compose.yml up -d
#
# All data is local. No cloud services. Volumes persist across restarts.
#
# Environment overrides:
#   VSDD_OBS_GRAFANA_PORT      — host port for Grafana UI (default 3000)
#   VSDD_OBS_LOKI_PORT         — host port for Loki HTTP API (default 3100)
#   VSDD_OBS_OTLP_HTTP_PORT    — host port for OTLP HTTP receiver (default 4318)
#   VSDD_OBS_PROMETHEUS_PORT   — host port for Prometheus UI/API (default 9090)
#
# Multi-factory architecture (v0.78.0+):
#   This base compose file does NOT declare the .factory/logs bind mount
#   directly. `bin/factory-obs up` reads the user registry at
#   $XDG_CONFIG_HOME/vsdd-factory/watched-factories, generates a
#   docker-compose.override.yml alongside this file with one bind mount
#   per registered factory (each at /var/log/factory/<safe-name>/),
#   and starts the stack via `docker compose -f base.yml -f override.yml`.
#   The collector globs /var/log/factory/*/events-*.jsonl so all
#   factories feed the same Loki. Users should NEVER run
#   `docker compose -f docker-compose.yml up` directly — the generated
#   override is what wires the factory logs in.

services:
  loki:
    image: grafana/loki:3.6.10
    container_name: vsdd-obs-loki
    ports:
      - "${VSDD_OBS_LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: ["-config.file=/etc/loki/local-config.yaml"]
    restart: unless-stopped
    # Loki 3.6+ ships as a full distroless image — no shell, no wget, no
    # curl, nothing but the `loki` binary itself. Docker's HEALTHCHECK runs
    # inside the container and requires an executable, so a traditional
    # healthcheck isn't possible here. Downstream services instead depend
    # on the `loki-ready` init container, which polls /ready from a
    # busybox image on the shared network and exits 0 when Loki accepts
    # traffic. See loki-ready below.

  # One-shot init container. Polls Loki's /ready endpoint from outside
  # the (distroless) Loki container until it answers, then exits. Services
  # that require Loki to be accepting writes should declare
  # `depends_on: { loki-ready: { condition: service_completed_successfully } }`.
  # busybox is ~5 MB; negligible overhead.
  loki-ready:
    image: busybox:1.37
    container_name: vsdd-obs-loki-ready
    command:
      - sh
      - -c
      - |
        echo "loki-ready: waiting for http://loki:3100/ready"
        until wget -qO- http://loki:3100/ready 2>/dev/null | grep -q "^ready$"; do
          sleep 2
        done
        echo "loki-ready: loki is accepting writes"
    depends_on:
      - loki
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: vsdd-obs-collector
    # Run as root so the collector can write to the root-owned named volume
    # (collector-state). The image runs as UID 10001 by default, which cannot
    # write to a fresh Docker-created named volume. Local-only dev stack; the
    # volume is isolated from the host, so this doesn't grant host privileges.
    user: "0:0"
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      # Per-factory .factory/logs/ bind mounts are injected by
      # factory-obs's generated docker-compose.override.yml (see header
      # comment). Each watched factory lands at
      # /var/log/factory/<safe-name>/. The collector's filelog glob
      # /var/log/factory/*/events-*.jsonl picks them all up.
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
      # State directory for the file_storage extension (remembers last offset)
      - collector-state:/var/lib/otelcol
    ports:
      # OTLP HTTP — for Claude Code's native OTel emission, if enabled
      - "${VSDD_OBS_OTLP_HTTP_PORT:-4318}:4318"
    depends_on:
      loki-ready:
        condition: service_completed_successfully
      prometheus:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.2
    container_name: vsdd-obs-prometheus
    ports:
      - "${VSDD_OBS_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      # Accept remote_write pushes from the otel-collector. Without this
      # flag, the collector's prometheusremotewrite exporter gets a 404.
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:13.0.1
    container_name: vsdd-obs-grafana
    ports:
      - "${VSDD_OBS_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - ./grafana-dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      # Anonymous admin access for local-only dev. If exposing beyond
      # localhost, switch to proper auth.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      # Renderer sidecar (v0.76.0). Lets Grafana produce PNG/PDF of any
      # panel via /render/d-solo/…; used by the /api/ds/query tests and by
      # anyone who wants to export a panel. Optional — the stack is fully
      # functional without it, but transform-heavy panels (like Factory ROI's
      # cross-datasource math) are much easier to verify with it available.
      GF_RENDERING_SERVER_URL: "http://renderer:8081/render"
      GF_RENDERING_CALLBACK_URL: "http://grafana:3000/"
      # Grafana 11+ refuses to start with the default renderer_token. It's
      # a shared-secret between Grafana and the renderer sidecar (used when
      # Grafana calls back into the renderer); must be set to any non-default
      # value. This is a local-only dev stack, so we use a static token —
      # do NOT reuse this value if you expose the renderer beyond localhost.
      GF_RENDERING_RENDERER_TOKEN: "vsdd-local-renderer-token"
      GF_LOG_FILTERS: "rendering:debug"
    depends_on:
      loki-ready:
        condition: service_completed_successfully
      prometheus:
        condition: service_healthy
    restart: unless-stopped

  # Headless Chromium-based panel renderer. Used for on-demand PDF/PNG
  # export and, crucially, for verifying transform-heavy panels. Image is
  # ~280 MB but it's pulled lazily on first render request by default.
  # Separate container so a renderer crash doesn't take down Grafana.
  renderer:
    image: grafana/grafana-image-renderer:3.11.0
    container_name: vsdd-obs-renderer
    ports:
      - "${VSDD_OBS_RENDERER_PORT:-8081}:8081"
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8081
      ENABLE_METRICS: "false"
      # Must match GF_RENDERING_RENDERER_TOKEN on the Grafana side.
      AUTH_TOKEN: "vsdd-local-renderer-token"
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
  collector-state:
  prometheus-data:
