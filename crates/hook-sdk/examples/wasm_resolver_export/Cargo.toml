[package]
name = "wasm-resolver-export"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish = false

# This crate is a cdylib compiled to wasm32-wasip1.
# It exists solely to verify that the #[resolver] macro generates a
# `resolve` export in the WASM binary (BC-4.12.002 PC1/PC5).
# Build with: cargo build --target wasm32-wasip1 -p wasm-resolver-export
[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
vsdd-hook-sdk = { path = "../..", features = ["resolver-authoring"] }
serde_json = { workspace = true }
