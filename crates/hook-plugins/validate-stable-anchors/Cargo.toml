[package]
name = "validate-stable-anchors"
version = "0.0.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "WASM hook plugin: enforces TD-VSDD-091 stable-anchor convention — blocks spec body text containing volatile source-file line citations (`*.<ext>:NNN` where ext is any source/config/test file extension). Initial driver: TD-031 (P1)."
publish = false

# Hook plugins ship as WASI commands (_start entry point) built via
# `cargo build --target wasm32-wasip1`. The [lib] target carries testable
# logic; [[bin]] wraps the macro-generated entry point that calls into the lib.
[lib]
path = "src/lib.rs"

[[bin]]
name = "validate-stable-anchors"
path = "src/main.rs"

[dependencies]
vsdd-hook-sdk = { path = "../../hook-sdk" }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
vsdd-hook-sdk = { path = "../../hook-sdk" }

[lints]
workspace = true
