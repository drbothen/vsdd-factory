# .factory/policies.yaml — Declarative governance policy registry
#
# Each project maintains its own policy list. The adversarial-review skill
# auto-loads this file into the adversary's dispatch rubric. Lint hooks
# read this file to determine which validators to run.
#
# Initialize with: /vsdd-factory:policy-registry init
# Add policies with: /vsdd-factory:policy-add <name>
# Validate with: /vsdd-factory:policy-registry validate
#
# Schema per entry:
#   id: <integer>              # Sequential policy number
#   name: <string>             # snake_case policy flag name
#   description: <string>      # One-line human-readable description
#   adopted: <string>          # Context where adopted (burst, pass, or date)
#   severity: <HIGH|MEDIUM>    # Severity floor for violations
#   enforced_by: [<string>]    # Enforcement mechanisms
#   scope: [<string>]          # Artifact types this policy covers
#   lint_hook: <string|null>   # Path to automated hook (relative to plugin root)
#   verification_steps: [<string>]  # Step-by-step check procedure for the adversary
#                                   # Baseline policies (1-9) have steps baked into agent
#                                   # prompts. Custom policies (10+) MUST include steps
#                                   # here so the adversary knows HOW to verify them.
#   codified_at: <D-NNN|null>  # Decision-log D-NNN at which this policy was formally
#                              # registered as a D-NNN-class governance event. Baseline
#                              # policies (1-12) predate the codified_at convention
#                              # (established by D-472 / S-15.06 F-PASS14-003 closure
#                              # 2026-05-15); their codified_at is null. POLICY 13-18
#                              # were registered at commit b8909832 (2026-05-14) and
#                              # retroactively assigned D-472 per S-15.06.

policies:
  - id: 1
    name: append_only_numbering
    description: "All VSDD identifiers are never renumbered or reused. Retired IDs stay in indexes. Filename slugs are immutable."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [bc, vp, di, cap, story, hs]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Scan all index files for retired/removed IDs — verify no active artifact reuses a retired ID"
      - "Verify retired entries have replaced_by or removal justification"
      - "Check that filename slugs match original creation (compare git log if available)"

  - id: 2
    name: lift_invariants_to_bcs
    description: "Every domain invariant (DI-NNN) must be cited by at least one BC's Traceability L2 Invariants field. Orphan invariants are drift."
    adopted: baseline
    severity: MEDIUM
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [di, bc]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Read domain-spec/invariants.md — extract all DI-NNN IDs"
      - "For each DI-NNN, search BC files for citations in Traceability/L2 Invariants fields"
      - "Report orphan invariants (DI declared but no BC enforces it)"
      - "Verify invariant Scope/enforcer column names BCs that cite it back (bidirectional)"

  - id: 3
    name: state_manager_runs_last
    description: "State-manager agent must be the last to commit in every burst, preventing version-race regressions."
    adopted: baseline
    severity: HIGH
    enforced_by: [orchestrator-rule]
    scope: [story, bc, vp, architecture]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Review burst commit history — state-manager commits must come after all other agents"
      - "Check for citation staleness — STORY-INDEX/BC-INDEX versions must match latest story-writer/PO output"

  - id: 4
    name: semantic_anchoring_integrity
    description: "Every anchor claim must be semantically correct, not just syntactically valid. Mis-anchoring always blocks convergence."
    adopted: baseline
    severity: MEDIUM
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [bc, vp, story, architecture]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "For each BC, verify declared capability actually describes the BC's purpose per capabilities.md"
      - "For each story, verify subsystems: field references subsystems that own the story's scope per ARCH-INDEX"
      - "For each VP, verify anchor_story builds the test vehicle (not an architectural ancestor)"
      - "For traceability table rows, verify descriptions match target artifact's actual title"

  - id: 5
    name: creators_justify_anchors
    description: "Agents creating anchors must justify each choice against the source-of-truth artifact. Stop and ask rather than guess."
    adopted: baseline
    severity: MEDIUM
    enforced_by: [adversary-prompt]
    scope: [bc, vp, story, cap, architecture]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Check that BC→CAP anchors include justification citing capabilities.md"
      - "Check that story→subsystem anchors include justification citing ARCH-INDEX"
      - "Check that VP→anchor_story assignments justify why that story builds the test vehicle"
      - "Flag mechanical citations without body substantiation"

  - id: 6
    name: architecture_is_subsystem_name_source_of_truth
    description: "ARCH-INDEX Subsystem Registry is the canonical source for subsystem names. All references must match verbatim."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [bc, story, prd, architecture]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Read ARCH-INDEX Subsystem Registry for canonical subsystem names"
      - "For sampled BCs, verify subsystem: frontmatter matches registry exactly"
      - "For sampled stories, verify subsystems: field uses registry names"
      - "Check BC-INDEX subsystem column matches ARCH-INDEX"

  - id: 7
    name: bc_h1_is_title_source_of_truth
    description: "BC file H1 heading is the authoritative BC title. All downstream references must match. Enrichment goes INTO the H1."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [bc, story, prd]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Sample 10+ BCs — read H1 heading and compare to BC-INDEX title column"
      - "Check for downstream-only enrichment not present in H1"
      - "Verify H1 accurately describes what the BC's postconditions specify"

  - id: 8
    name: bc_array_changes_propagate_to_body_and_acs
    description: "When a story bcs: frontmatter changes, the same commit must update body BC table, ACs, and Token Budget count."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator]
    scope: [story, bc]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Sample 5+ stories — for each BC in behavioral_contracts: frontmatter (canonical field; alias: bcs: for S-15.03 only), verify it appears in body BC table"
      - "For each BC in behavioral_contracts: frontmatter, verify at least one AC traces to it"
      - "For each BC in body BC table or AC traces, verify it appears in behavioral_contracts: frontmatter"
      - "Verify Token Budget BC count matches len(behavioral_contracts)"

  - id: 9
    name: vp_index_is_vp_catalog_source_of_truth
    description: "VP-INDEX.md is authoritative. Changes must propagate same-burst to verification-architecture.md and verification-coverage-matrix.md."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, lint-hook, consistency-validator]
    scope: [vp, architecture]
    lint_hook: hooks/validate-vp-consistency.sh
    codified_at: null
    verification_steps:
      - "Verify VP-INDEX arithmetic: total = sum of per-tool counts = row count"
      - "For each VP in VP-INDEX, verify it appears in verification-architecture.md Provable Properties Catalog"
      - "For each VP in VP-INDEX, verify it appears in verification-coverage-matrix.md VP-to-Module table"
      - "Sum coverage matrix per-tool columns — must equal VP-INDEX per-tool totals"
      - "Reverse check: every VP in arch docs must exist in VP-INDEX"

  - id: 10
    name: demo_evidence_story_scoped
    description: "All demo-recorder output MUST live under docs/demo-evidence/<STORY-ID>/. No flat files at docs/demo-evidence/*.md."
    adopted: baseline
    severity: HIGH
    enforced_by: [adversary-prompt, consistency-validator, pr-reviewer, lint-hook]
    scope: [story, demo-evidence, pr]
    lint_hook: hooks/validate-demo-evidence-story-scoped.sh
    codified_at: null
    verification_steps:
      - "For each story's feature branch, verify docs/demo-evidence/<STORY-ID>/ exists"
      - "Verify NO files exist at docs/demo-evidence/*.md — only subfolders"
      - "Cross-check: subfolder name matches the story's frontmatter story_id"

  - id: 11
    name: no_test_tautologies
    description: "test_BC_* and test_TV_* functions must call a production fn (emit_*, process_*, validate_*, etc.) — they cannot only assert on data they themselves constructed. Promotes Check 8 of validate-consistency from advisory to gating."
    adopted: 2026-04-27
    severity: MEDIUM
    enforced_by: [validate-consistency, adversary-prompt]
    scope: [test, story]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Run validate-consistency Check 8 (Test Tautology Detector)"
      - "For each FLAGGED row in the Advisories section, treat as a blocking finding"
      - "Recognized opt-outs: function carries `/// data-shape pin` doc-comment, OR file-level `//! tautology-allowed: <reason>` declaration"
      - "Reference fixtures: ${CLAUDE_PLUGIN_ROOT}/skills/validate-consistency/fixtures/tautology/"

  - id: 12
    name: bc_tv_emitter_consistency
    description: "When a BC's Canonical Test Vectors table marks a field excluded (e.g., 'Field X in Entry? = No'), the production struct must not unconditionally serialize that field. Promotes Check 9 of validate-consistency from advisory to gating."
    adopted: 2026-04-27
    severity: HIGH
    enforced_by: [validate-consistency, adversary-prompt]
    scope: [bc, code]
    lint_hook: null
    codified_at: null
    verification_steps:
      - "Run validate-consistency Check 9 (BC Canonical TV ↔ Emitter Field Consistency)"
      - "For each FLAGGED row in the Advisories section, treat as a blocking finding"
      - "Recognized opt-outs: BC frontmatter `tv_emitter_check: skip` or `tv_emitter_check: manual`, OR row notes column says 'field tolerated when present'"
      - "Reference fixtures: ${CLAUDE_PLUGIN_ROOT}/skills/validate-consistency/fixtures/bc-tv-consistency/"

  - id: 13
    name: hh_n_regex_alternation_predicates
    description: "Pre-fix scope-determination grep predicates MUST use regex-alternation (-E flag with | alternation) covering all syntactic forms of canonical-violation pattern, not single literal strings. Each predicate covers all permutations (table-cell vs heading vs prose vs lowercase descriptive)."
    adopted: "2026-05-14 (E-10 pass-13 fix burst D-468; codifies HH-4 structural resolution from pass-13 §7)"
    severity: HIGH
    enforced_by: [adversary-prompt, architect-prompt, state-manager-prompt]
    scope: [bc, vp, story, epic, architecture, all-spec]
    lint_hook: null
    codified_at: D-472
    verification_steps:
      - "Adversary: when surfacing a canonical-violation finding, predicate must use regex-alternation grep (-E flag with alternation), not single literal string"
      - "Architect: pre-fix scope-determination grep at fix-burst time must use HH-N predicate with regex-alternation covering all syntactic forms"
      - "State-manager: post-fix verification grep must use the same regex-alternation form; verbatim stdout captured per POLICY 15 (LL-N)"

  - id: 14
    name: kk_n_tripartite_parity_gate
    description: "When a body changelog row is added with version v(N+1), the same burst MUST sync frontmatter last_amended: (today's date) AND append to modified: array. Body changelog, last_amended, and modified[] are TRIPARTITE-PARITY and must all match same-burst."
    adopted: "2026-05-14 (D-468; codifies KK-2 tripartite-parity from E-10 pass-11/12 discipline)"
    severity: HIGH
    enforced_by: [state-manager-prompt, consistency-validator, pre-commit-hook]
    scope: [bc, vp, story, epic]
    lint_hook: null
    codified_at: D-472
    verification_steps:
      - "For each file with body Changelog section, verify latest row date matches frontmatter last_amended:"
      - "Verify frontmatter modified: array's last entry corresponds to latest body Changelog row"
      - "Verify frontmatter version: matches body Changelog row's version cell"
      - "All three must be updated in the same burst — no deferred-frontmatter pattern"

  - id: 15
    name: ll_n_verbatim_stdout_discipline
    description: "Literal-shell evidence at persistence layer (changelog rows, decision-log rows, commit bodies) MUST include both command verbatim AND captured file:line: stdout verbatim, OR sentinel '(zero output)' / '(EXIT:1; no matches)'. Narrative paraphrase of grep outcomes is NOT compliant."
    adopted: "2026-05-14 (D-468; codifies LL-3 strict-form elevating LL-2 hybrid-command+narrative-output to full file:line: requirement)"
    severity: HIGH
    enforced_by: [adversary-prompt, state-manager-prompt, consistency-validator]
    scope: [arch-index, bc-index, vp-index, story-index, cycle-decision-log, cycle-burst-log]
    lint_hook: null
    codified_at: D-472
    verification_steps:
      - "Adversary: when verifying a closure claim, check the changelog/decision-log row for verbatim file:line: stdout content (not just command text)"
      - "State-manager: when writing changelog/decision-log rows asserting grep verification, include verbatim stdout (file:line: matched-text) or sentinel (zero output) or (EXIT:1; no matches)"
      - "Narrative paraphrase like 'all rows are legitimate exclusions' or 'zero live violations' is forbidden — must show verbatim file:line: evidence"
      - "LL-2 hybrid form (verbatim command + narrative output) is NOT compliant; LL-3 requires both command AND verbatim output"

  - id: 16
    name: mm_n_cross_cycle_namespace_gate
    description: "D-NNN identifiers are GLOBAL namespace across all cycles. State-manager MUST allocate next-D-NNN > max(all existing D-NNN across all cycle decision-logs). Any body content citing a D-NNN must be verifiable at citation-authoring time. Planning-stage placeholder D-NNNs must use sentinel form D-{TBD-pass-N-fix-burst} until allocated."
    adopted: "2026-05-14 (D-468; codifies MM allocation gate + MM-2 citation-authoring scope extension from pass-13 §7)"
    severity: HIGH
    enforced_by: [state-manager-prompt, architect-prompt, pre-commit-hook]
    scope: [all-cycles, decision-log, spec, story]
    lint_hook: null
    codified_at: D-472
    verification_steps:
      - "State-manager: pre-burst, run grep across all cycle decision-logs to find global D-NNN max; assert next-allocation is global-max+1"
      - "Architect: when authoring body changelog rows citing D-NNN, verify D-NNN exists in appropriate cycle's decision-log AT THAT TIME (citation-authoring scope)"
      - "Planning-stage placeholders use sentinel form like D-{TBD-pass-N-fix-burst}; must NOT use bare D-NNN before allocation"
      - "Cross-cycle: D-NNN from F5 cycle must not be reused in brownfield cycle and vice versa; global namespace is shared"

  - id: 17
    name: nn_n_frontmatter_parity_full_file_type_scope
    description: "KK-N tripartite-parity discipline (POLICY 14) applies to all 4 file-type layers: BC, epic, story, VP. Each file type has the same body Changelog, frontmatter last_amended:, and frontmatter modified: requirement at fix-burst time."
    adopted: "2026-05-14 (D-468; codifies NN-2 epic+story+VP scope extension from pass-13 §7 F-PASS13-002)"
    severity: HIGH
    enforced_by: [state-manager-prompt, architect-prompt, consistency-validator]
    scope: [bc, epic, story, vp]
    lint_hook: null
    codified_at: D-472
    verification_steps:
      - "For each spec/story/epic/VP file with a body Changelog section, verify NN-2 frontmatter parity (last_amended + modified[] + version) — same predicates as POLICY 14 (KK-N) but applied to all 4 file types"
      - "Adversary: when a fix burst touches an epic or VP, verify NN-2 parity was applied (not just BC-level KK-N)"
      - "State-manager: at seal-time, grep for last_amended and modified: in all files touched by architect in the burst"

  - id: 18
    name: oo_input_hash_mechanical_verification
    description: "Any narrative claim of input-hash: change MUST be backed by literal bin/compute-input-hash invocation with captured stdout in burst evidence. inputs: array must include all files whose modifications would trigger the input-hash change."
    adopted: "2026-05-14 (D-468; codifies OO discipline from pass-13 §9 F-PASS13-004 — narrative-vs-content drift class)"
    severity: MEDIUM
    enforced_by: [state-manager-prompt, architect-prompt, pre-commit-hook]
    scope: [bc, vp, story, architecture]
    lint_hook: null
    codified_at: D-472
    verification_steps:
      - "When a file's input-hash: field changes in a burst, verify the burst evidence contains literal bin/compute-input-hash invocation + captured stdout matching the new hash"
      - "Verify the file's inputs: array lists every file whose modification triggered the hash change"
      - "If bin/compute-input-hash is not available, document this explicitly and note hash was verified against prior burst narrative; flag for automation in S-15.03 PRIORITY-A"
      - "Reject narrative-attestation-only input-hash drift claims without tool invocation evidence"
