# deny.toml -- cargo-deny configuration for vsdd-factory
# Enforces license audit gate (AC-Q4 of S-4.08 rc.1 release gate).
# See: https://embarkstudios.github.io/cargo-deny/

[licenses]
# Approved open-source license allow-list (AC-Q4).
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    # Additional permissive licenses common in the Rust ecosystem:
    "BSD-2-Clause",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
    "OpenSSL",
]
# Deny copyleft licenses that would infect the codebase.
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-3.0",
]
# Allow exceptions where an unlicensed crate is well-known and safe.
unlicensed = "deny"
# Clarify dual-licensed crates (MIT OR Apache-2.0 is the Rust standard).
allow-osi-fsf-free = "neither"
copyleft = "deny"
exceptions = []

[bans]
# Prevent multiple versions of the same crate where possible.
multiple-versions = "warn"
# Deny known-problematic crates.
deny = []

[advisories]
# Audit against the RustSec advisory database.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[sources]
# Only allow crates from crates.io and this repository.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
