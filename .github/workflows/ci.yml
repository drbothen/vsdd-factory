name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Mount factory artifacts
        run: |
          git fetch origin factory-artifacts
          git worktree add .factory origin/factory-artifacts

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bats
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Syntax check shell scripts
        run: |
          set -e
          for f in plugins/vsdd-factory/hooks/*.sh plugins/vsdd-factory/bin/*; do
            bash -n "$f"
          done
          echo "all scripts ok"

      - name: Run hook tests
        run: bats plugins/vsdd-factory/tests/hooks.bats

      - name: Run bin tests
        run: bats plugins/vsdd-factory/tests/bin.bats

      - name: Validate marketplace JSON
        run: |
          jq empty .claude-plugin/marketplace.json
          jq empty plugins/vsdd-factory/.claude-plugin/plugin.json
          jq empty plugins/vsdd-factory/hooks/hooks.json

      - name: Verify hooks.json.<platform> variants match template
        # Drift check for S-0.4: hooks.json.template is the source of
        # truth for the v1.0 dispatcher's per-platform hook configs.
        # CI regenerates the 5 variants and diffs against the committed
        # files; any drift fails the build with a clean diff so the
        # operator knows exactly which variant to refresh.
        run: scripts/generate-hooks-json.sh --check

      - name: Verify version parity across plugin.json and marketplace.json
        run: |
          # Catches the v0.68.1/v0.69.0 failure mode: plugin.json bumped
          # but marketplace.json left stale, which silently fails the tag-
          # triggered Release workflow later. Fail fast on main push / PRs
          # so the drift is visible before it reaches a tag.
          PLUGIN_VERSION=$(jq -r '.version' plugins/vsdd-factory/.claude-plugin/plugin.json)
          MKT_VERSION=$(jq -r '.plugins[0].version // empty' .claude-plugin/marketplace.json)
          if [ -z "$PLUGIN_VERSION" ] || [ -z "$MKT_VERSION" ]; then
            echo "::error::Could not read versions (plugin.json=$PLUGIN_VERSION, marketplace.json=$MKT_VERSION)"
            exit 1
          fi
          if [ "$PLUGIN_VERSION" != "$MKT_VERSION" ]; then
            echo "::error::Version drift: plugin.json=$PLUGIN_VERSION marketplace.json=$MKT_VERSION"
            echo "Run scripts/bump-version.sh to sync both files."
            exit 1
          fi
          echo "Version parity ok: $PLUGIN_VERSION"

      - name: Parse all workflow files
        run: |
          for f in plugins/vsdd-factory/workflows/*.lobster plugins/vsdd-factory/workflows/phases/*.lobster; do
            plugins/vsdd-factory/bin/lobster-parse "$f" '.workflow.name' >/dev/null
          done
          echo "all workflows parse"

  cargo-check:
    # Rust workspace gates for the v1.0 Factory Plugin Kit (S-1.1). The full
    # 5-platform matrix arrives in S-2.3; keeping this two-platform for now
    # so the workspace bootstrap doesn't carry Windows CI complexity.
    name: cargo (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        # Pinned in rust-toolchain.toml — keep this version in sync with that file.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check --all
        run: cargo fmt --check --all

      - name: cargo clippy (workspace, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check (workspace, all targets)
        run: cargo check --workspace --all-targets

      - name: cargo test (workspace, all targets)
        run: cargo test --workspace --all-targets

      - name: cargo publish --dry-run (hook-sdk crates) (S-2.5)
        # Catches publishability regressions every push: missing
        # README, missing license metadata, broken sibling version
        # pin, etc. We use `--workspace` because the parent crate
        # depends on its sibling via path+version, and cargo's
        # single-crate dry-run cannot resolve the sibling until it's
        # actually on crates.io. The workspace mode stages both into
        # a tmp registry and verifies them together. CI is always
        # clean so we omit `--allow-dirty`.
        run: cargo publish --dry-run --workspace -p vsdd-hook-sdk-macros -p vsdd-hook-sdk

      - name: cargo build (wasm32-wasip1 plugin)
        run: cargo build -p capture-commit-activity --target wasm32-wasip1

      - name: cargo build (hello-hook example, wasm32-wasip1)
        # Compiling the example end-to-end exercises the #[hook] macro
        # expansion + the SDK's stdin/panic/result framing on the real
        # plugin target. If the macro regresses, this catches it before
        # any plugin author sees it.
        run: cargo build -p vsdd-hook-sdk --example hello-hook --target wasm32-wasip1
