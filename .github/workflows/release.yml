name: Release

on:
  push:
    tags: ["v*"]

permissions:
  # `contents: write` is needed for the binary-bundling commit + tag retag
  # in the `commit-binaries` job. The push targets `main` (fast-forward
  # append of the binary commit) and the tag (force-move to point at the
  # new HEAD); both go through GITHUB_TOKEN, which does NOT re-trigger
  # workflow runs by default — so the retag does not loop.
  contents: write

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Mount factory artifacts
        run: |
          git fetch origin factory-artifacts
          git worktree add .factory origin/factory-artifacts

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run test suite
        run: cd plugins/vsdd-factory/tests && ./run-all.sh

      - name: Shellcheck hooks and bin scripts
        run: |
          for f in plugins/vsdd-factory/hooks/*.sh plugins/vsdd-factory/bin/*; do
            shellcheck "$f"
          done

      # Note: tag-vs-plugin.json validation was removed in v1.0.0-beta.4
      # along with the cache-staleness fix. plugin.json now stays at the
      # *previous* version during the chore commit; the bot commit
      # (commit-binaries job below) writes it from the tag atomically with
      # the binaries. So at validate time plugin.json deliberately disagrees
      # with the tag — asserting otherwise would block every release.
      # CHANGELOG.md is the only file the operator's chore commit touches.
      #
      # Note: marketplace.json was removed from this repo in v1.0.0-rc.7
      # — the marketplace lives at drbothen/claude-mp and points here via
      # git-subdir + ref=main. claude-mp owns its own version field.

      - name: Validate CHANGELOG.md has the new version heading
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qE "^## ${TAG_VERSION}([[:space:]]|$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing the ## $TAG_VERSION heading."
            echo "Run: scripts/bump-version.sh $TAG_VERSION \"<release title>\""
            echo "then commit CHANGELOG.md and re-tag."
            exit 1
          fi

  build-binaries:
    # Build the v1.0 dispatcher binary on each of the 5 supported
    # platforms and upload as artifacts. `commit-binaries` consumes them.
    # Mirrors ci.yml's `build-dispatcher` matrix layout — when that
    # changes, this must change in lockstep (ci/platforms.yaml is the
    # canonical platform list).
    name: Build dispatcher (${{ matrix.platform }})
    needs: validate
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            use_cross: false
          - platform: darwin-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            use_cross: false
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}, wasm32-wasip1

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 588b3c99db52b5a9c5906fab96cfadcf1bde7863

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.platform }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build dispatcher (release)
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p factory-dispatcher
          else
            cargo build --release --target ${{ matrix.target }} -p factory-dispatcher
          fi

      - name: Build wasm plugins + example (release)
        shell: bash
        run: |
          # legacy-bash-adapter is the production WASI command every
          # registry entry routes through. The `--bin legacy-bash-adapter`
          # form is required because the crate has both [lib] (for tests)
          # and [[bin]] (the WASI command) targets.
          cargo build --release --target wasm32-wasip1 -p legacy-bash-adapter --bin legacy-bash-adapter
          # update-wave-state-on-merge default features are [] (safe host::write_file
          # path); --no-default-features is explicit for clarity (HIGH-W15-004 / W-15-gate).
          cargo build --release --target wasm32-wasip1 -p update-wave-state-on-merge --no-default-features
          # All other native WASM plugins build cleanly via workspace pass.
          # Sinks + dispatcher are excluded — they don't target wasm32-wasip1.
          cargo build --release --target wasm32-wasip1 \
            --workspace \
            --exclude legacy-bash-adapter \
            --exclude update-wave-state-on-merge \
            --exclude factory-dispatcher \
            --exclude sink-core --exclude sink-file --exclude sink-otel-grpc \
            --exclude sink-http --exclude sink-datadog --exclude sink-honeycomb \
            --exclude vsdd-hook-sdk-macros
          # Build the hello-hook example artifact.
          cargo build --release --target wasm32-wasip1 -p vsdd-hook-sdk --example hello-hook

      - name: Stage artifact directory
        shell: bash
        run: |
          mkdir -p artifact
          if [ "${{ matrix.platform }}" = "windows-x64" ]; then
            cp target/${{ matrix.target }}/release/factory-dispatcher.exe artifact/
          else
            cp target/${{ matrix.target }}/release/factory-dispatcher artifact/
          fi
          # Bundle all wasm artifacts. They are identical across platforms so
          # every leg ships them redundantly; commit-binaries uses linux-x64 as
          # canonical source. The glob catches all 16 native plugins.
          if compgen -G "target/wasm32-wasip1/release/*.wasm" > /dev/null; then
            cp target/wasm32-wasip1/release/*.wasm artifact/
          fi
          # hello-hook example lives under examples/
          cp target/wasm32-wasip1/release/examples/hello-hook.wasm artifact/ 2>/dev/null || true

      - name: Verify all 16 native WASM plugins are staged
        shell: bash
        run: |
          count=$(ls artifact/*.wasm 2>/dev/null | wc -l)
          if [ "$count" -lt 16 ]; then
            echo "::error::Only $count wasm files staged in artifact/; expected >= 16."
            ls artifact/*.wasm 2>/dev/null || true
            exit 1
          fi
          echo "Staged $count wasm files."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: factory-dispatcher-${{ matrix.platform }}
          path: artifact/
          retention-days: 14
          if-no-files-found: error

  commit-binaries:
    # Downloads every platform's release artifact, stages the binaries
    # under plugins/vsdd-factory/hooks/dispatcher/bin/<platform>/, drops
    # the wasm plugins under plugins/vsdd-factory/hook-plugins/,
    # regenerates the per-platform hooks.json variants (so they always
    # reference the just-shipped binary path), then creates a follow-up
    # commit on main and re-points the tag to the new HEAD. Activation
    # at this tag finds executable binaries — no operator-side build
    # needed.
    #
    # Strategy is "follow-up commit + retag" (per S-2.4 spec). Branch
    # protection on `main` must allow github-actions[bot] to push; if
    # protections block the push, the bundling silently fails and the
    # tag stays on the chore commit (operator can re-run manually).
    name: Commit bundled binaries + retag
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch full history so the commit graph is available for
          # the tag move.
          fetch-depth: 0
          # The `main` branch is where the binary commit lands. The
          # tag's commit (the chore release commit) IS on main; we
          # need a writeable checkout of main, not a detached
          # tag-checkout.
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          pattern: factory-dispatcher-*

      - name: Stage binaries
        run: |
          set -e
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 windows-x64; do
            mkdir -p "plugins/vsdd-factory/hooks/dispatcher/bin/$platform"
            artifact_dir="/tmp/artifacts/factory-dispatcher-$platform"
            if [ "$platform" = "windows-x64" ]; then
              cp "$artifact_dir/factory-dispatcher.exe" \
                 "plugins/vsdd-factory/hooks/dispatcher/bin/$platform/factory-dispatcher.exe"
            else
              cp "$artifact_dir/factory-dispatcher" \
                 "plugins/vsdd-factory/hooks/dispatcher/bin/$platform/factory-dispatcher"
              chmod +x "plugins/vsdd-factory/hooks/dispatcher/bin/$platform/factory-dispatcher"
            fi
            echo "staged $platform"
          done

      - name: Stage wasm plugins
        run: |
          set -e
          mkdir -p plugins/vsdd-factory/hook-plugins
          # The wasm artifacts are identical across platforms; pull
          # from the linux-x64 leg as the canonical source. (Any leg
          # would work — they all compile the same wasm32-wasip1.)
          src="/tmp/artifacts/factory-dispatcher-linux-x64"
          for wasm in "$src"/*.wasm; do
            [ -f "$wasm" ] || continue
            cp "$wasm" plugins/vsdd-factory/hook-plugins/
            echo "staged $(basename "$wasm")"
          done

      - name: Verify all 16 native WASM plugins are staged
        shell: bash
        run: |
          count=$(ls plugins/vsdd-factory/hook-plugins/*.wasm 2>/dev/null | wc -l)
          if [ "$count" -lt 16 ]; then
            echo "::error::Only $count wasm files staged; expected >= 16."
            ls plugins/vsdd-factory/hook-plugins/*.wasm 2>/dev/null || true
            exit 1
          fi
          echo "Staged $count wasm files."

      - name: Regenerate hooks.json.<platform> variants
        run: scripts/generate-hooks-json.sh

      - name: Bump plugin.json from tag
        run: |
          set -e
          # The chore commit ships only CHANGELOG.md updates — plugin.json
          # stays at the previous version. This step writes the new version
          # (read from the git tag) so the bot's binary-bundle commit
          # advertises version X atomically with the version-X binaries.
          #
          # This eliminates the cache-staleness race observed in
          # v1.0.0-beta.2: between the chore commit (plugin.json:version=X,
          # no binaries) and the bot commit (plugin.json:version=X, real
          # binaries), Claude Code's plugin cache could lock to version
          # X with stale (X-1) binaries. With the bump moved here, the
          # window closes — plugin.json:version=X never exists without
          # the matching binaries.
          #
          # As of v1.0.0-rc.7 marketplace.json is no longer in this repo —
          # the marketplace lives at drbothen/claude-mp and points here
          # via git-subdir + ref=main. Bumping the marketplace's version
          # field is a separate downstream concern (see claude-mp repo).
          version="${GITHUB_REF_NAME#v}"
          echo "Writing version $version into plugin.json"
          tmp=$(mktemp)
          jq ".version = \"$version\"" plugins/vsdd-factory/.claude-plugin/plugin.json > "$tmp"
          mv "$tmp" plugins/vsdd-factory/.claude-plugin/plugin.json
          # Sanity check: verify the file now agrees on the new version.
          plugin_v=$(jq -r '.version' plugins/vsdd-factory/.claude-plugin/plugin.json)
          [ "$plugin_v" = "$version" ] || { echo "plugin.json version write failed: $plugin_v != $version"; exit 1; }
          echo "plugin.json      = $plugin_v"

      - name: Commit + retag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # `-f` because plugins/vsdd-factory/hook-plugins/ is gitignored
          # for local dev (developers `cargo build … --target wasm32-wasip1`
          # into it) — the release workflow is the intentional one path
          # that bundles the wasm artifacts into source control.
          # plugin.json is bumped atomically here too (see "Bump plugin.json
          # from tag" above) so consumers never observe version=X without
          # the matching binaries.
          git add -f plugins/vsdd-factory/.claude-plugin/plugin.json \
                     plugins/vsdd-factory/hooks/dispatcher/bin/ \
                     plugins/vsdd-factory/hook-plugins/ \
                     plugins/vsdd-factory/hooks/hooks.json.*

          if git diff --staged --quiet; then
            echo "No binary or generated changes to commit; nothing to retag."
            exit 0
          fi

          git commit -m "chore: bundle dispatcher binaries for $GITHUB_REF_NAME"

          # Move the tag forward to include the bundled-binaries commit.
          # Force-update only the tag, never main.
          git tag -fa "$GITHUB_REF_NAME" -m "Release $GITHUB_REF_NAME (with bundled binaries)"

          # Push order matters: main first (the binary commit must exist
          # remotely before the tag can point at it), then the tag with
          # --force to move it.
          git push origin main
          git push origin --force "refs/tags/$GITHUB_REF_NAME"

      - name: Sync bundle commit to develop (inline best-effort)
        # The bot just wrote the new version into plugin.json on main and
        # bundled the dispatcher binaries. This step keeps develop in sync
        # with main for git workflow consistency (develop should always be
        # a superset of main's content) so feature branches off develop
        # never lag the released binaries.
        #
        # Pre-rc.7 this was also necessary for marketplace.json freshness
        # — Claude Code reads marketplace.json from the marketplace repo's
        # default branch. Now that marketplace.json lives in the separate
        # drbothen/claude-mp repo (pointed at this repo via git-subdir +
        # ref=main), that concern is moot here. Sync continues for binary
        # bundle freshness on develop.
        #
        # This step is best-effort: it tries to push the merge directly
        # from inside the bot's job. On any failure (race, branch
        # protection, conflict), it logs a warning and exits 0 so the
        # sync-develop job below catches it as a safety net. The release
        # itself never fails because of this step.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Skip cleanly if no bundle commit was created (the "Commit
          # + retag" step above exited early). HEAD's commit message is
          # the canonical signal: the bot's bundle commit always starts
          # with "chore: bundle dispatcher binaries".
          last_msg=$(git log -1 --pretty=%s)
          case "$last_msg" in
            "chore: bundle dispatcher binaries"*) ;;
            *)
              echo "No bundle commit at HEAD ($last_msg); inline sync skipped."
              exit 0
              ;;
          esac

          # Fetch develop into a local tracking branch. Tolerate failure
          # — the sync-develop job will retry from a clean checkout.
          if ! git fetch origin develop:develop 2>&1; then
            echo "::warning::Could not fetch develop; sync-develop job will retry."
            exit 0
          fi

          # Already in sync? Nothing to do.
          if git merge-base --is-ancestor HEAD develop 2>/dev/null; then
            echo "develop already contains HEAD; inline sync is a no-op."
            exit 0
          fi

          # Merge main into develop with a no-ff merge commit.
          git checkout develop
          if ! git merge --no-ff main \
                 -m "merge: sync main → develop after $GITHUB_REF_NAME bundle" \
                 -m "Inline back-merge from the commit-binaries job. See .github/workflows/release.yml."; then
            echo "::warning::Inline merge produced conflicts; sync-develop job will retry."
            git merge --abort || true
            exit 0
          fi

          # Best-effort push. Sync-develop catches any failure.
          if git push origin develop; then
            echo "Inline sync to develop succeeded."
          else
            echo "::warning::Inline develop push blocked; sync-develop job will retry."
          fi

      - name: Verify binaries are executable on this runner
        # Sanity check: the linux-x64 binary we just committed should
        # run on this ubuntu runner. Catches the case where strip
        # produced a corrupt binary or the artifact was misnamed.
        run: |
          set -e
          binary="plugins/vsdd-factory/hooks/dispatcher/bin/linux-x64/factory-dispatcher"
          if [ -x "$binary" ]; then
            echo "linux-x64 binary verified executable on ubuntu runner."
          else
            echo "::warning::linux-x64 binary not executable — investigate."
          fi

  release:
    name: Create GitHub Release
    needs: commit-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the (possibly retagged) commit so the GH Release
          # is anchored at the binaries-included version.
          ref: ${{ github.ref }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # vsdd-factory CHANGELOG format: ## X.Y.Z — Title (no brackets)
          awk "
            /^## ${VERSION} / { found=1; print; next }
            found && /^## / { exit }
            found { print }
          " CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > /tmp/release-notes.md
          fi

      - name: Prepend prerelease banner
        # Prerelease detection mirrors the `prerelease:` flag below — any
        # tag with a hyphen in its name (semver 2.0 §9 prerelease suffix,
        # e.g. v1.0.0-beta.1, v1.0.0-rc.2) gets a banner so consumers know
        # the build is not stable. Stable tags (v1.0.0, v0.79.5) skip this.
        if: contains(github.ref_name, '-')
        run: |
          {
            echo "> **Pre-release** — this is a development build of vsdd-factory."
            echo "> Stable releases are the unhyphenated tags (e.g. \`1.0.0\`)."
            echo "> Use prereleases for early integration only; APIs, schemas, and"
            echo "> on-disk formats may still change before the matching stable tag."
            echo ""
            cat /tmp/release-notes.md
          } > /tmp/release-notes.with-banner.md
          mv /tmp/release-notes.with-banner.md /tmp/release-notes.md

      - name: Append bundled-binaries note
        run: |
          {
            cat /tmp/release-notes.md
            echo ""
            echo "---"
            echo ""
            echo "## Bundled binaries"
            echo ""
            echo "This release ships pre-built \`factory-dispatcher\` binaries for all"
            echo "5 supported platforms under \`plugins/vsdd-factory/hooks/dispatcher/bin/<platform>/\`,"
            echo "plus the WASM hook plugins under \`plugins/vsdd-factory/hook-plugins/\`."
            echo "After install, run \`/vsdd-factory:activate\` — the activation skill"
            echo "selects the right binary for your platform automatically (no operator"
            echo "build required)."
          } > /tmp/release-notes.final.md
          mv /tmp/release-notes.final.md /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          # `contains(ref_name, '-')` flags prerelease (semver §9 hyphen marker).
          # GH treats prerelease=true tags as not "Latest", so marketplace tools
          # that resolve "/plugin install vsdd-factory@vsdd-factory" continue to
          # land on the most recent stable until the matching unhyphenated tag
          # ships. See S-0.2 for full rationale.
          prerelease: ${{ contains(github.ref_name, '-') }}

  bump-marketplace:
    # Auto-open a PR against drbothen/claude-mp bumping the vsdd-factory
    # plugin entry's `version` field to match this newly-released tag.
    #
    # Self-skips when the CLAUDE_MP_PAT secret is not configured. To
    # enable: create a PAT (or fine-grained token) with `contents: write`
    # + `pull-requests: write` scopes on drbothen/claude-mp and add it
    # as a repository secret named CLAUDE_MP_PAT in this repo's settings.
    #
    # The job opens a PR rather than committing directly so the operator
    # has a quick review gate before the marketplace catalog updates.
    name: Bump claude-mp marketplace version
    needs: release
    runs-on: ubuntu-latest
    steps:
      # GitHub Actions does NOT expose the `secrets` context in
      # job-level `if:` conditions (only in step-level `if:`). So instead
      # of `jobs.bump-marketplace.if: ${{ secrets.CLAUDE_MP_PAT != '' }}`,
      # we gate every subsequent step on a flag set by this preflight
      # step. When the secret is missing, the job runs but no work
      # happens — same effective behavior as a job-level skip.
      - name: Preflight — check CLAUDE_MP_PAT secret
        id: preflight
        env:
          PAT: ${{ secrets.CLAUDE_MP_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "CLAUDE_MP_PAT secret is not configured. Skipping marketplace bump."
            echo "To enable: create a PAT with contents:write + pull-requests:write"
            echo "scopes on drbothen/claude-mp and add it as CLAUDE_MP_PAT in this"
            echo "repo's Actions secrets."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out claude-mp
        if: steps.preflight.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          repository: drbothen/claude-mp
          token: ${{ secrets.CLAUDE_MP_PAT }}
          ref: main

      - name: Bump vsdd-factory version in marketplace.json
        if: steps.preflight.outputs.configured == 'true'
        run: |
          set -e
          version="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq "(.plugins[] | select(.name == \"vsdd-factory\")).version = \"$version\"" \
            .claude-plugin/marketplace.json > "$tmp"
          mv "$tmp" .claude-plugin/marketplace.json
          new_version=$(jq -r '.plugins[] | select(.name == "vsdd-factory") | .version' .claude-plugin/marketplace.json)
          [ "$new_version" = "$version" ] || { echo "version write failed: got $new_version"; exit 1; }
          echo "Bumped vsdd-factory to $version in claude-mp marketplace.json"

      - name: Open PR
        if: steps.preflight.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_MP_PAT }}
        run: |
          set -e
          version="${GITHUB_REF_NAME#v}"
          BRANCH="bump-vsdd-factory-${GITHUB_REF_NAME}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If the bump produced no diff (already at this version), exit
          # cleanly. This handles re-runs of the release workflow.
          if git diff --quiet .claude-plugin/marketplace.json; then
            echo "No version change needed in claude-mp marketplace.json (already at $version)."
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump vsdd-factory to $version"
          git push origin "$BRANCH"

          body_file=$(mktemp)
          {
            printf 'Auto-generated by drbothen/vsdd-factory release.yml after %s shipped.\n\n' "$GITHUB_REF_NAME"
            printf 'Bumps the vsdd-factory plugin entry version field so users running\n'
            printf '`/plugin update vsdd-factory@claude-mp` resolve to the new release.\n\n'
            printf 'Underlying source ref is `main`, so the install always pulls the\n'
            printf 'tagged release SHA. This bump only updates the *displayed* version\n'
            printf 'in the marketplace catalog.\n'
          } > "$body_file"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump vsdd-factory to $version" \
            --body-file "$body_file"

  sync-develop:
    # Defense-in-depth backup for the inline sync inside commit-binaries.
    # The bot's "Sync bundle commit to develop (inline best-effort)" step
    # tries to push the merge directly from within its own job; this job
    # is the safety net for cases where the inline push fails silently
    # (race, branch protection lifted mid-run, conflicting unrelated
    # commits on develop landed during the build).
    #
    # Originally introduced in v1.0.0-rc.1 to keep develop's
    # marketplace.json in sync with main's after each tag. As of
    # v1.0.0-rc.7 marketplace.json no longer lives in this repo (moved
    # to drbothen/claude-mp), so the marketplace-freshness rationale no
    # longer applies. The job remains for git workflow consistency:
    # develop should always be a superset of main's content (binary
    # bundle commits, plugin.json version bumps), so feature branches
    # never lag the released artifacts.
    #
    # When the inline sync succeeds (the common case), this job no-ops
    # via the "develop already contains origin/main" early exit. When
    # the inline sync fails, this job runs from a clean checkout with
    # explicit branch protection fallback (opens a PR instead of failing).
    #
    # Verification cadence: after each release tag, confirm this job
    # ran AND that develop's plugin.json version equals main's.
    name: Sync main → develop
    needs: commit-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history needed to merge main into develop without
          # spurious unrelated-histories errors.
          fetch-depth: 0
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main → develop and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git fetch origin main
          # --no-ff so the merge commit always exists on develop, giving
          # `git log` a clear "this is when develop caught up to main for
          # release X" marker. If there's nothing to merge (the bot
          # bundle job no-op'd because nothing changed), exit cleanly.
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "develop already contains origin/main — no sync needed."
            exit 0
          fi

          if ! git merge --no-ff origin/main \
                 -m "merge: sync main → develop after $GITHUB_REF_NAME bundle" \
                 -m "Automated back-merge of the post-tag binary-bundle commit so the GitHub default branch (develop) reflects the latest released plugin.json version and bundled binaries. See sync-develop job in .github/workflows/release.yml."; then
            echo "::warning::Merge produced conflicts — opening PR for manual resolution."
            git merge --abort || true
            exit 1
          fi

          # Try direct push first. If branch protection on develop blocks
          # the bot, fall back to a PR.
          if git push origin develop; then
            echo "Pushed sync merge to develop."
          else
            echo "::warning::Direct push to develop blocked — opening PR."
            BRANCH="sync/main-to-develop-${GITHUB_REF_NAME}"
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
            body_file=$(mktemp)
            {
              printf 'Automated back-merge of the post-tag binary-bundle commit so develop reflects the released plugin.json + bundled binaries for %s. Bot blocked from pushing directly to develop — please review and merge.\n\n' "$GITHUB_REF_NAME"
              printf 'See `sync-develop` job in `.github/workflows/release.yml` for full context.\n'
            } > "$body_file"
            gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "merge: sync main → develop after $GITHUB_REF_NAME bundle" \
              --body-file "$body_file"
          fi
